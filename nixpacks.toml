# nixpacks.toml — Railway build config
# Installs Python (for yt-dlp) + ffmpeg alongside Node.js
# bun is included so yt-dlp can use it as a JS runtime for YouTube PO tokens

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "nodejs_20", "bun"]

[phases.install]
cmds = [
  "npm install",
  "pip install -U --pre yt-dlp curl-cffi --break-system-packages",
  "pip install bgutil-ytdlp-pot-provider --break-system-packages"
]

[start]
cmd = "node server/index.js"
